services:
  tagarr:
    build: .
    container_name: tagarr
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PLEX_URL: "${PLEX_URL:-http://plex.local:32400}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
      JELLYFIN_URL: "${JELLYFIN_URL:-}"
      JELLYFIN_API_KEY: "${JELLYFIN_API_KEY:-}"
      CONFIG_PATH: "/config/config.yaml"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # All YAML keys can be overridden via env. Uncomment to override:
      # LABELS: '["auto-labeled","needs-review"]'
      # PLEX_LIBRARY_TYPES: '["movie","show"]'
      # JELLYFIN_ITEM_TYPES: '["Movie","Episode","Series"]'
      # LOG_FILE: "/var/log/tagarr/app.log"
      # LOG_MAX_BYTES: "5242880"
      # LOG_BACKUP_COUNT: "5"
      # WEBHOOK_TOKEN: "optional-shared-secret"
    volumes:
      - ./config:/config:ro
      - ./logs:/var/log/tagarr
