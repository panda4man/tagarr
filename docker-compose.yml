services:
  plex-labeling:
    build: .
    container_name: plex-labeling
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PLEX_URL: "${PLEX_URL:-http://plex.local:32400}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
      CONFIG_PATH: "/config/config.yaml"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # WEBHOOK_TOKEN: "optional-shared-secret"
    volumes:
      - ./config:/config:ro
      - ./logs:/var/log/plex-labeling
